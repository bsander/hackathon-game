<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcane Akash</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game">
  <!-- Header -->
  <div id="header">
    <span id="round-label">ROUND 1</span>
    <div class="score">
      <span class="score-label">P1</span>
      <span class="pip" id="p1-pip-0"></span>
      <span class="pip" id="p1-pip-1"></span>
      <span class="pip" id="p1-pip-2"></span>
    </div>
    <div class="score">
      <span class="score-label">P2</span>
      <span class="pip" id="p2-pip-0"></span>
      <span class="pip" id="p2-pip-1"></span>
      <span class="pip" id="p2-pip-2"></span>
    </div>
  </div>

  <!-- Arena -->
  <div id="arena">
    <div class="player-col" id="p1-col">
      <div class="avatar" id="p1-avatar">🧙</div>
      <div class="player-name">PLAYER 1</div>
      <div class="player-role" id="p1-role"></div>
    </div>

    <div id="centre">
      <div id="spell-banner"></div>
      <div id="phase-label"></div>
      <div id="countdown-container">
        <div id="countdown-bar"></div>
      </div>
      <div id="countdown-text"></div>
    </div>

    <div class="player-col" id="p2-col">
      <div class="avatar" id="p2-avatar">🧟</div>
      <div class="player-name">PLAYER 2</div>
      <div class="player-role" id="p2-role"></div>
    </div>
  </div>

  <!-- Overlay -->
  <div id="overlay">
    <div id="overlay-text"></div>
    <div id="overlay-sub"></div>
  </div>

  <!-- Paused -->
  <div id="paused">PAUSED</div>

  <!-- Spell Panels -->
  <div id="spell-panels">
    <div class="spell-panel" id="p1-panel">
      <div class="spell-slot" id="p1-slot-0"><span class="key">[1]</span> <span class="slot-name">Fireball</span> <span class="slot-emoji">🔥</span></div>
      <div class="spell-slot" id="p1-slot-1"><span class="key">[2]</span> <span class="slot-name">Shield</span> <span class="slot-emoji">🛡</span></div>
      <div class="spell-slot" id="p1-slot-2"><span class="key">[3]</span> <span class="slot-name">Hex</span> <span class="slot-emoji">💀</span></div>
    </div>
    <div id="spell-info">🌀 = Chaos (random outcome, resets on cast)</div>
    <div class="spell-panel" id="p2-panel">
      <div class="spell-slot" id="p2-slot-0"><span class="key">[8]</span> <span class="slot-name">Fireball</span> <span class="slot-emoji">🔥</span></div>
      <div class="spell-slot" id="p2-slot-1"><span class="key">[9]</span> <span class="slot-name">Shield</span> <span class="slot-emoji">🛡</span></div>
      <div class="spell-slot" id="p2-slot-2"><span class="key">[0]</span> <span class="slot-name">Hex</span> <span class="slot-emoji">💀</span></div>
    </div>
  </div>

  <!-- Instruction Bar -->
  <div id="instruction-bar">Press SPACE to begin the duel</div>

  <!-- RPS Legend -->
  <div id="rps-legend">🔥 &gt; 💀 &gt; 🛡 &gt; 🔥 &nbsp;|&nbsp; 🌀 = random, resets on cast</div>
</div>

<script src="bundle.js"></script>

</body>
</html>
